name: Google Indexing

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *' # Once a day

jobs:
  google-indexing:
    runs-on: ubuntu-latest
    steps:
      - name: Send Indexing Request
        uses: robingenz/action-google-indexing@v1.0.0
        with:
          siteUrl: ${{ secrets.SITE_URL }}
          gcpServiceAccountKey: ${{ secrets.GCP_SA_KEY }}
